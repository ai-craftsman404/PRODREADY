name: PRODREADY CI

on:
  push:
    branches: [main]
  pull_request:

env:
  # GitHub-hosted runners will default JavaScript actions to Node 24 starting 2026-06-02.
  # Opt in early to avoid surprise breakage and remove Node 20 deprecation warnings.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Tests
        run: npm test
